services:
  mysql:
    image: mysql:latest
    volumes:
      - mysql:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_1
      MYSQL_USER: user
      MYSQL_PASSWORD: user1234
    ports:
      - '3307:3306'  # Mapujemy port 3307 (Twój komputer) na 3306 (kontener)
    # expose i MYSQL_TCP_PORT są tutaj zbędne i mogą wprowadzać błąd
volumes:
  mysql: